name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      THEOS: $HOME/theos
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (ldid & make)
        run: |
          brew install ldid make
          brew list --versions ldid make

      - name: Install Theos (no install.sh needed)
        run: |
          # 克隆带所有子模块的 Theos
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          # 设置环境变量
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          # 验证安装
          ls -la $HOME/theos/bin/

      - name: Build Tweak
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CardKeyPlugin-deb
          path: packages/*.deb
