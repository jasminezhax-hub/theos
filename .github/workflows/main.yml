name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          # 安装SDK（避免版本缺失问题）
          cd $HOME/theos
          ./bin/install.sh

      - name: Install dependencies
        run: |
          brew install ldid make

      - name: Verify environment
        run: |
          echo "THEOS path: $THEOS"
          which make
          make --version

      - name: Build Tweak
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: CardKeyPlugin-deb
          path: packages/*.deb
